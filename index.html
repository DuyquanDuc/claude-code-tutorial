<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本語 Study Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2328;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
    }

    .auth-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-section img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .auth-section span {
      font-size: 13px;
      color: #656d76;
    }

    .auth-btn {
      padding: 6px 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }

    .auth-btn:hover {
      background: #ebedf0;
    }

    @media (max-width: 600px) {
      .header-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .auth-section {
        gap: 6px;
      }

      .auth-section span {
        display: none;
      }

      .auth-btn {
        padding: 4px 10px;
        font-size: 11px;
      }

      .auth-btn svg {
        margin-right: 0 !important;
      }

      .heatmap-container {
        padding: 20px 12px;
      }

      .weeks {
        padding-right: 8px;
      }
    }

    .subtitle {
      color: #656d76;
      margin-bottom: 30px;
    }

    .commit-form {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .commit-input {
      flex: 1;
      padding: 10px 14px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      color: #1f2328;
      font-size: 14px;
    }

    .commit-input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .commit-btn {
      padding: 10px 20px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .commit-btn:hover {
      background: #2ea043;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
    }

    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    .stat-label {
      color: #656d76;
      font-size: 14px;
    }

    .heatmap-container {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 20px;
      overflow-x: auto;
    }

    .heatmap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .heatmap-title {
      font-size: 14px;
      color: #656d76;
    }

    .months {
      display: flex;
      font-size: 11px;
      color: #656d76;
      margin-bottom: 5px;
      margin-left: 30px;
      position: relative;
      height: 15px;
    }

    .month {
      position: absolute;
      font-size: 11px;
    }

    .heatmap {
      display: flex;
      gap: 3px;
    }

    .days-label {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-right: 5px;
      font-size: 11px;
      color: #656d76;
    }

    .day-label {
      height: 12px;
      line-height: 12px;
    }

    .weeks {
      display: flex;
      gap: 3px;
    }

    .week {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .day {
      width: 12px;
      height: 12px;
      background: #ebedf0;
      border: 1px solid #1f2328;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .day:hover {
      outline: 1px solid #1b1f23;
    }

    .day[data-level="0"] { background: #ebedf0; }
    .day[data-level="1"] { background: #9be9a8; }
    .day[data-level="2"] { background: #40c463; }
    .day[data-level="3"] { background: #30a14e; }
    .day[data-level="4"] { background: #216e39; }

    .legend {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 15px;
      justify-content: flex-end;
      font-size: 11px;
      color: #656d76;
    }

    .legend-box {
      width: 12px;
      height: 12px;
      border: 1px solid #1f2328;
      border-radius: 2px;
    }

    .legend-box[data-level="0"] { background: #ebedf0; }
    .legend-box[data-level="1"] { background: #9be9a8; }
    .legend-box[data-level="2"] { background: #40c463; }
    .legend-box[data-level="3"] { background: #30a14e; }
    .legend-box[data-level="4"] { background: #216e39; }

    .tooltip {
      position: fixed;
      background: #24292f;
      color: #ffffff;
      border: 1px solid #1b1f23;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    .recent-commits {
      margin-top: 30px;
    }

    .recent-title {
      font-size: 16px;
      margin-bottom: 15px;
    }

    .commit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .commit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
    }

    .commit-dot {
      width: 8px;
      height: 8px;
      background: #30a14e;
      border-radius: 50%;
    }

    .commit-message {
      flex: 1;
    }

    .commit-date {
      color: #656d76;
      font-size: 12px;
    }

    .commit-actions {
      display: flex;
      gap: 8px;
    }

    .commit-actions button {
      background: none;
      border: none;
      color: #656d76;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .commit-actions button:hover {
      background: #d0d7de;
      color: #1f2328;
    }

    .commit-actions .delete-btn:hover {
      background: #ffebe9;
      color: #cf222e;
    }

    .empty-state {
      text-align: center;
      color: #656d76;
      padding: 40px;
    }

    .daily-checklist {
      margin-bottom: 30px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px 20px;
    }

    .checklist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .checklist-title {
      font-size: 16px;
      font-weight: 600;
    }

    .checklist-date {
      font-size: 13px;
      color: #656d76;
    }

    .checklist-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .checklist-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #238636;
      cursor: pointer;
    }

    .checklist-item label {
      cursor: pointer;
      flex: 1;
    }

    .checklist-item .remove-activity-btn {
      background: none;
      border: none;
      color: #cf222e;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .checklist-item:hover .remove-activity-btn {
      opacity: 1;
    }

    .checklist-item .remove-activity-btn:hover {
      background: #ffebe9;
    }

    .add-activity-form {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #d0d7de;
    }

    .add-activity-form input {
      flex: 1;
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      color: #1f2328;
    }

    .add-activity-form input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .add-activity-form button {
      padding: 6px 12px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-activity-form button:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>Consistency Calendar</h1>
      <div class="auth-section" id="authSection">
        <button class="auth-btn" id="signInBtn" onclick="signIn()"><svg width="16" height="16" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Sign in with Google</button>
      </div>
    </div>
    <p class="subtitle">Track your daily consistency</p>

    <div class="daily-checklist" id="dailyChecklist">
      <div class="checklist-header">
        <span class="checklist-title">Today's Activities</span>
        <span class="checklist-date" id="checklistDate"></span>
      </div>
      <div class="checklist-items" id="checklistItems"></div>
      <div class="add-activity-form">
        <input type="text" id="newActivityInput" placeholder="Add a new activity...">
        <button onclick="addActivity()">+ Add</button>
      </div>
    </div>

    <form class="commit-form" id="commitForm">
      <input
        type="text"
        class="commit-input"
        id="studyInput"
        placeholder="What did you do today? (e.g., exercised for 30 minutes)"
        required
      >
      <button type="submit" class="commit-btn">Commit</button>
    </form>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="totalCommits">0</span>
        <span class="stat-label">total commits</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="currentStreak">0</span>
        <span class="stat-label">day streak</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="thisYear">0</span>
        <span class="stat-label">this year</span>
      </div>
    </div>

    <div class="heatmap-container">
      <div class="heatmap-header">
        <span class="heatmap-title" id="yearLabel">2024</span>
      </div>
      <div class="months" id="months"></div>
      <div class="heatmap">
        <div class="days-label">
          <div class="day-label">Sun</div>
          <div class="day-label">Mon</div>
          <div class="day-label">Tue</div>
          <div class="day-label">Wed</div>
          <div class="day-label">Thu</div>
          <div class="day-label">Fri</div>
          <div class="day-label">Sat</div>
        </div>
        <div class="weeks" id="weeks"></div>
      </div>
      <div class="legend">
        <span>Less</span>
        <div class="legend-box" data-level="0"></div>
        <div class="legend-box" data-level="1"></div>
        <div class="legend-box" data-level="2"></div>
        <div class="legend-box" data-level="3"></div>
        <div class="legend-box" data-level="4"></div>
        <span>More</span>
      </div>
    </div>

    <div class="recent-commits">
      <h2 class="recent-title">Recent Activity</h2>
      <div class="commit-list" id="commitList"></div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <!-- Firebase SDK (compat mode for simplicity with no build system) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAzliBn84UHnGegKVITvEiSnWyV22tCSkg",
      authDomain: "consistency-tracker-1db76.firebaseapp.com",
      projectId: "consistency-tracker-1db76",
      storageBucket: "consistency-tracker-1db76.firebasestorage.app",
      messagingSenderId: "410530324715",
      appId: "1:410530324715:web:5a24542be4b4607f729eae",
      measurementId: "G-VCWC8P358D"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    // ── Auth ──
    function signIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        alert('Sign-in failed: ' + err.message);
      });
    }

    function signOut() {
      auth.signOut();
    }

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      updateAuthUI();
      if (user) {
        await loadFromFirestore();
      }
      render();
    });

    function updateAuthUI() {
      const section = document.getElementById('authSection');
      if (currentUser) {
        section.innerHTML = `
          <img src="${currentUser.photoURL || ''}" alt="" referrerpolicy="no-referrer">
          <span>${escapeHtml(currentUser.displayName || currentUser.email)}</span>
          <button class="auth-btn" onclick="signOut()">Sign out</button>
        `;
      } else {
        section.innerHTML = `<button class="auth-btn" onclick="signIn()"><svg width="16" height="16" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Sign in with Google</button>`;
      }
    }

    // ── Firestore helpers ──
    function userDoc() {
      return db.collection('users').doc(currentUser.uid);
    }

    async function loadFromFirestore() {
      try {
        const doc = await userDoc().get();
        if (doc.exists) {
          const data = doc.data();
          if (data.commits) localStorage.setItem(STORAGE_KEY, JSON.stringify(data.commits));
          if (data.activities) localStorage.setItem(ACTIVITIES_KEY, JSON.stringify(data.activities));
          if (data.checked) localStorage.setItem(CHECKED_KEY, JSON.stringify(data.checked));
        } else {
          // First sign-in: push local data to Firestore
          await syncToFirestore();
        }
      } catch (err) {
        console.error('Firestore load error:', err);
      }
    }

    async function syncToFirestore() {
      if (!currentUser) return;
      try {
        await userDoc().set({
          commits: getCommits(),
          activities: getActivities(),
          checked: JSON.parse(localStorage.getItem(CHECKED_KEY) || '{}')
        }, { merge: true });
      } catch (err) {
        console.error('Firestore sync error:', err);
      }
    }

    // ── Local storage keys ──
    const STORAGE_KEY = 'japanese-study-commits';
    const ACTIVITIES_KEY = 'study-tracker-activities';
    const CHECKED_KEY = 'study-tracker-checked';

    const DEFAULT_ACTIVITIES = [
      'Japanese 5 mins study',
      'Reading book 5 mins',
      '10 sit ups',
      '10 push ups',
      '5 minutes 会話練習',
      '1 commit'
    ];

    function getActivities() {
      const data = localStorage.getItem(ACTIVITIES_KEY);
      return data ? JSON.parse(data) : DEFAULT_ACTIVITIES;
    }

    function saveActivities(activities) {
      localStorage.setItem(ACTIVITIES_KEY, JSON.stringify(activities));
      syncToFirestore();
    }

    function getCheckedToday() {
      const data = localStorage.getItem(CHECKED_KEY);
      const checked = data ? JSON.parse(data) : {};
      const today = formatDate(new Date());
      return checked[today] || [];
    }

    function setCheckedToday(checkedList) {
      const data = localStorage.getItem(CHECKED_KEY);
      const checked = data ? JSON.parse(data) : {};
      const today = formatDate(new Date());
      checked[today] = checkedList;
      localStorage.setItem(CHECKED_KEY, JSON.stringify(checked));
      syncToFirestore();
    }

    function toggleActivity(activityName) {
      const checked = getCheckedToday();
      const idx = checked.indexOf(activityName);
      if (idx === -1) {
        checked.push(activityName);
        setCheckedToday(checked);
        addCommit(`✅ ${activityName}`);
      } else {
        checked.splice(idx, 1);
        const commits = getCommits();
        const today = formatDate(new Date());
        const toRemove = commits.findIndex(c => {
          const cDate = formatDate(new Date(c.date));
          return cDate === today && c.message === `✅ ${activityName}`;
        });
        if (toRemove !== -1) {
          commits.splice(toRemove, 1);
          saveCommits(commits);
        }
        setCheckedToday(checked);
        render();
      }
    }

    function addActivity() {
      const input = document.getElementById('newActivityInput');
      const name = input.value.trim();
      if (!name) return;
      const activities = getActivities();
      if (activities.includes(name)) return;
      activities.push(name);
      saveActivities(activities);
      input.value = '';
      renderChecklist();
    }

    function removeActivity(name) {
      if (!confirm(`Remove "${name}" from activities?`)) return;
      const activities = getActivities().filter(a => a !== name);
      saveActivities(activities);
      renderChecklist();
    }

    function renderChecklist() {
      const container = document.getElementById('checklistItems');
      const activities = getActivities();
      const checked = getCheckedToday();
      const today = new Date();
      document.getElementById('checklistDate').textContent = today.toLocaleDateString('en-US', {
        weekday: 'long', month: 'short', day: 'numeric'
      });

      container.innerHTML = activities.map((activity, i) => {
        const isChecked = checked.includes(activity);
        const id = `activity-${i}`;
        return `
          <div class="checklist-item">
            <input type="checkbox" id="${id}" ${isChecked ? 'checked' : ''} onchange="toggleActivity('${activity.replace(/'/g, "\\'")}')">
            <label for="${id}">${escapeHtml(activity)}</label>
            <button class="remove-activity-btn" onclick="removeActivity('${activity.replace(/'/g, "\\'")}')">×</button>
          </div>
        `;
      }).join('');
    }

    document.getElementById('newActivityInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addActivity(); }
    });

    function getCommits() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveCommits(commits) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(commits));
      syncToFirestore();
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getDateKey(date) {
      return formatDate(date);
    }

    function addCommit(message) {
      const commits = getCommits();
      commits.push({
        id: Date.now(),
        message,
        date: new Date().toISOString()
      });
      saveCommits(commits);
      render();
    }

    function deleteCommit(id) {
      if (confirm('Delete this commit?')) {
        const commits = getCommits().filter(c => c.id !== id);
        saveCommits(commits);
        render();
      }
    }

    function editCommit(id) {
      const commits = getCommits();
      const commit = commits.find(c => c.id === id);
      if (!commit) return;

      const newMessage = prompt('Edit commit message:', commit.message);
      if (newMessage !== null && newMessage.trim()) {
        commit.message = newMessage.trim();
        saveCommits(commits);
        render();
      }
    }

    function getCommitsByDate() {
      const commits = getCommits();
      const byDate = {};
      commits.forEach(commit => {
        const date = getDateKey(new Date(commit.date));
        byDate[date] = (byDate[date] || 0) + 1;
      });
      return byDate;
    }

    function getLevel(count) {
      if (count === 0) return 0;
      if (count <= 1) return 1;
      if (count <= 3) return 2;
      if (count <= 5) return 3;
      return 4;
    }

    function calculateStreak() {
      const byDate = getCommitsByDate();
      let streak = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let checkDate = new Date(today);

      if (!byDate[getDateKey(checkDate)]) {
        checkDate.setDate(checkDate.getDate() - 1);
      }

      while (byDate[getDateKey(checkDate)]) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      }

      return streak;
    }

    function renderHeatmap() {
      const weeksContainer = document.getElementById('weeks');
      const monthsContainer = document.getElementById('months');
      const byDate = getCommitsByDate();
      const today = new Date();

      const year = 2026;
      document.getElementById('yearLabel').textContent = year;

      const startDate = new Date(year, 0, 1);
      const endDate = new Date(year, 11, 31);

      const firstSunday = new Date(startDate);
      while (firstSunday.getDay() !== 0) {
        firstSunday.setDate(firstSunday.getDate() - 1);
      }

      weeksContainer.innerHTML = '';
      monthsContainer.innerHTML = '';

      let currentDate = new Date(firstSunday);
      let currentMonth = -1;
      const monthPositions = [];

      let week = 0;
      while (currentDate <= endDate || currentDate.getDay() !== 0) {
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week';

        for (let day = 0; day < 7; day++) {
          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';

          const isInYear = currentDate.getFullYear() === year;
          const isPastToday = currentDate > today;

          if (isInYear) {
            const dateKey = getDateKey(currentDate);
            const count = byDate[dateKey] || 0;
            dayDiv.setAttribute('data-level', isPastToday ? 0 : getLevel(count));
            dayDiv.setAttribute('data-date', dateKey);
            dayDiv.setAttribute('data-count', count);
            if (isPastToday) {
              dayDiv.style.opacity = '0.3';
            }

            if (day === 0 && currentDate.getMonth() !== currentMonth) {
              currentMonth = currentDate.getMonth();
              monthPositions.push({ month: currentMonth, week: week });
            }
          } else {
            dayDiv.style.visibility = 'hidden';
          }

          weekDiv.appendChild(dayDiv);
          currentDate.setDate(currentDate.getDate() + 1);
        }

        weeksContainer.appendChild(weekDiv);
        week++;

        if (week > 54) break;
      }

      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      monthPositions.forEach(({ month, week }) => {
        const monthSpan = document.createElement('span');
        monthSpan.className = 'month';
        monthSpan.textContent = monthNames[month];
        monthSpan.style.left = `${week * 15}px`;
        monthsContainer.appendChild(monthSpan);
      });
    }

    function renderRecentCommits() {
      const commits = getCommits().slice(-10).reverse();
      const container = document.getElementById('commitList');

      if (commits.length === 0) {
        container.innerHTML = '<div class="empty-state">No commits yet. Start studying!</div>';
        return;
      }

      container.innerHTML = commits.map(commit => {
        const date = new Date(commit.date);
        const formatted = date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
        return `
          <div class="commit-item">
            <div class="commit-dot"></div>
            <span class="commit-message">${escapeHtml(commit.message)}</span>
            <span class="commit-date">${formatted}</span>
            <div class="commit-actions">
              <button onclick="editCommit(${commit.id})">Edit</button>
              <button class="delete-btn" onclick="deleteCommit(${commit.id})">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateStats() {
      const commits = getCommits();
      const thisYear = commits.filter(c =>
        new Date(c.date).getFullYear() === new Date().getFullYear()
      ).length;

      document.getElementById('totalCommits').textContent = commits.length;
      document.getElementById('currentStreak').textContent = calculateStreak();
      document.getElementById('thisYear').textContent = thisYear;
    }

    function render() {
      renderHeatmap();
      renderRecentCommits();
      updateStats();
      renderChecklist();
    }

    // Event listeners
    document.getElementById('commitForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const input = document.getElementById('studyInput');
      if (input.value.trim()) {
        addCommit(input.value.trim());
        input.value = '';
      }
    });

    // Tooltip
    const tooltip = document.getElementById('tooltip');
    document.getElementById('weeks').addEventListener('mouseover', (e) => {
      if (e.target.classList.contains('day') && e.target.dataset.date) {
        const count = e.target.dataset.count;
        const date = new Date(e.target.dataset.date + 'T00:00:00');
        const formatted = date.toLocaleDateString('en-US', {
          weekday: 'short',
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        });
        tooltip.textContent = `${count} commit${count !== '1' ? 's' : ''} on ${formatted}`;
        tooltip.style.display = 'block';
      }
    });

    document.getElementById('weeks').addEventListener('mousemove', (e) => {
      tooltip.style.left = e.pageX + 10 + 'px';
      tooltip.style.top = e.pageY + 10 + 'px';
    });

    document.getElementById('weeks').addEventListener('mouseout', (e) => {
      if (e.target.classList.contains('day')) {
        tooltip.style.display = 'none';
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
